<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nohva Admin Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed": "#221b00", "background": "#f9f9f9", "primary-container": "#ffd700", "on-surface-variant": "#4d4732", "outline-variant": "#d0c6ab", "on-primary-container": "#705e00", "on-primary": "#ffffff", "on-surface": "#1b1b1b", "surface-container-highest": "#e2e2e2", "primary": "#705d00", "secondary": "#5e5e5e", "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .brand-font { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-surface-container-lowest p-10 md:p-14 shadow-2xl relative overflow-hidden">
        <!-- Abstract Decoration -->
        <div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container opacity-20 rotate-45"></div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-on-surface uppercase mb-2">NOHVA</h1>
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-secondary">Admin Portal</p>
        </div>

        <form id="loginForm" class="space-y-8 relative z-10">
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-secondary block">Username</label>
                <input type="text" id="username" class="w-full bg-transparent border-0 border-b border-outline-variant py-2 focus:ring-0 focus:border-primary text-sm font-bold tracking-tight" autocomplete="off" required>
            </div>
            
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-widest text-secondary block">Passkey</label>
                <input type="password" id="password" class="w-full bg-transparent border-0 border-b border-outline-variant py-2 focus:ring-0 focus:border-primary text-sm font-bold tracking-tight" autocomplete="off" required>
            </div>
            
            <button type="submit" class="w-full bg-on-surface text-surface py-5 mt-4 text-xs font-bold uppercase tracking-[0.2em] hover:bg-primary transition-all duration-600">
                Authenticate
            </button>
            
            <p id="errorMsg" class="text-[10px] font-bold uppercase tracking-widest text-[#ba1a1a] text-center hidden">Invalid Credentials.</p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            // Checking credentials as requested
            if (user === 'nohva' && pass === 'nohva2025') {
                sessionStorage.setItem('nohva_admin_logged_in', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
